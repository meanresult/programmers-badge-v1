name: trigger_action

on:
  push:
    branches: ['master']
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-workflow]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.18.0'
          cache: 'npm'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_REPOSITORY: ${{ secrets.GH_REPOSITORY }}
          PROGRAMMERS_ID: ${{ secrets.PROGRAMMERS_ID }}
          PROGRAMMERS_PW: ${{ secrets.PROGRAMMERS_PW }}
      - name: Validate required secrets
        run: |
          set -euo pipefail
          test -n "${{ secrets.GH_PAT }}"
          test -n "${{ secrets.GH_REPOSITORY }}"
          test -n "${{ secrets.PROGRAMMERS_ID }}"
          test -n "${{ secrets.PROGRAMMERS_PW }}"
      - run: npm install
      - run: npm run build
      - run: |
          touch .env
          echo GH_PAT=${{ secrets.GH_PAT }} >> .env
          echo GH_REPOSITORY=${{ secrets.GH_REPOSITORY }} >> .env
          echo PROGRAMMERS_ID=${{ secrets.PROGRAMMERS_ID }} >> .env
          echo PROGRAMMERS_PW=${{ secrets.PROGRAMMERS_PW }} >> .env

      - name: Start application
        run: |
          set -euo pipefail
          npm run start > app.log 2>&1 &
          APP_PID=$!
          sleep 10
          cat app.log
          if ! kill -0 "$APP_PID" 2>/dev/null; then
            wait "$APP_PID"
          fi
          if grep -Eq 'ERROR|❌|TypeError' app.log; then
            exit 1
          fi
          kill "$APP_PID"
          wait "$APP_PID" || true
